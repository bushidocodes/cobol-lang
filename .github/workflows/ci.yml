name: CI

on:
  push:
    branches: ["master"]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install GnuCOBOL
        run: sudo apt-get update && sudo apt-get install -y gnucobol

      - name: Build (with warning flags)
        run: make build

      - name: Run tests
        run: make test

      # Regression gate: the tree is warning-free, so promote warnings to
      # errors in CI to keep it that way. Kept out of the default Makefile
      # build so local experimentation isn't blocked by warnings.
      - name: Build with -Werror (warning regression gate)
        run: |
          make clean
          make build WARN="-Wall -Wextra -Wcolumn-overflow -Wtruncate -Wunreachable -Werror"

      # Build once more with C-level hardening to mirror grok-cobol-game.
      # Passed via cobc's -A (C compile options); -O2 makes _FORTIFY_SOURCE
      # effective. CI-only, so the default `make build` stays simple.
      - name: Build with hardening flags
        run: |
          make clean
          make build HARDEN='-O2 -A "-D_FORTIFY_SOURCE=2 -fstack-protector-strong -Wformat -Wformat-security"'
