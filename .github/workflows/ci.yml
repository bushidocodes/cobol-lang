name: CI

on:
  push:
    branches: ["master"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install GnuCOBOL
        run: sudo apt-get update && sudo apt-get install -y gnucobol

      - name: Build (with warning flags)
        run: make build

      - name: Run tests
        run: make test
