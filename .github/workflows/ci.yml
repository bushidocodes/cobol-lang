name: CI

on:
  push:
    branches: ["master"]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install GnuCOBOL
        run: sudo apt-get update && sudo apt-get install -y gnucobol

      - name: Build (with warning flags)
        run: make build

      - name: Run tests
        run: make test

      # Regression gate: the tree is warning-free, so promote warnings to
      # errors in CI to keep it that way. Kept out of the default Makefile
      # build so local experimentation isn't blocked by warnings.
      - name: Build with -Werror (warning regression gate)
        run: |
          make clean
          make build WARN="-Wall -Wextra -Wcolumn-overflow -Wtruncate -Wunreachable -Werror"
